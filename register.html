<html>
<head>
<title>Регистрация</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.register-card {
    max-width: 400px;
    width: 100%;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}

.register-form {
    display: flex;
    flex-direction: column;
}

.register-form input {
    margin-bottom: 15px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

.register-form input:focus {
    border-color: orange;
}

.register-btn {
    background: orange;
    color: white;
    border: none;
    padding: 12px;
    cursor: pointer;
    border-radius: 5px;
}

.register-btn:hover {
    background: darkorange;
}
</style>

</head>
<body>

<div class="register-card">

<h2>Регистрация</h2>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
</head>
<body>

<form action="register.php" method="post">
    <input type="text" name="login" placeholder="Имя пользователя" required>
    <input type="email" name="email" placeholder="Электронная почта" required>
    <input type="password" name="pass" placeholder="Пароль" required>
    <input type="password" name="repeat_pass" placeholder="Повторите пароль" required>
	<input type="reset" value="Очистить">
    <button type="submit">Создать аккаунт</button>
</form>
</div>
</body>
</html>
